name: Accessibility CI

on:
  push:
    branches: [main, feat/a11y-testing]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pa11y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 0. Install required system libs (updated for Ubuntu)
      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libxss1 \
            libasound2t64 \
            libgbm-dev

      # 1. Install real Chrome (NOT puppeteer chromium)
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # 2. Tell Puppeteer/Pa11y to use system Chrome
      - name: Set Chrome path
        run: echo "PUPPETEER_EXECUTABLE_PATH=$(which google-chrome)" >> $GITHUB_ENV

      # 3. Run tests
      - name: Run Pa11y
        run: yarn a11y:ci
